name: Build & Push Docker Images (release)

on:
  push:
    tags:
      - 'v*'

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  IMAGE_NAME: openlist-strm-ruoyi

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.set-output.outputs.backend }}
      frontend: ${{ steps.set-output.outputs.frontend }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes from previous tag
        id: set-output
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          # 获取上一个 tag（排除当前 tag）
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -n 1)
          
          if [ -z "$PREV_TAG" ]; then
            # 第一个 tag，对比首次提交到当前
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          
          echo "Comparing: $PREV_TAG...$CURRENT_TAG"
          
          # 检测后端变更
          BACKEND_FILES=$(git diff --name-only "$PREV_TAG" "$CURRENT_TAG" -- \
            "ruoyi-*/**" "pom.xml" "mvnw" "Dockerfile.backend" \
            ".github/workflows/docker-publish-tag.yml" 2>/dev/null || true)
          
          if [ -n "$BACKEND_FILES" ]; then
            echo "Backend files changed:"
            echo "$BACKEND_FILES"
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "No backend changes"
            echo "backend=false" >> $GITHUB_OUTPUT
          fi
          
          # 检测前端变更
          FRONTEND_FILES=$(git diff --name-only "$PREV_TAG" "$CURRENT_TAG" -- \
            "openlist-web/**" "Dockerfile.frontend" \
            ".github/workflows/docker-publish-tag.yml" 2>/dev/null || true)
          
          if [ -n "$FRONTEND_FILES" ]; then
            echo "Frontend files changed:"
            echo "$FRONTEND_FILES"
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "No frontend changes"
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Build backend with Maven
        run: mvn -B package -DskipTests

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-backend:${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: openlist-web/package-lock.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: openlist-web

      - name: Build frontend
        run: npm run build
        working-directory: openlist-web

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-frontend:${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    needs: [detect-changes, build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git log --oneline --decorate | grep -m1 'tag: v' | cut -d'(' -f2 | cut -d')' -f1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG="v1.1.1"
          fi
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Generating release notes from $PREV_TAG...$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Release ${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          draft: false
          prerelease: false
