name: Build & Push Docker Images (beta)

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  IMAGE_NAME: openlist-strm-ruoyi

# 判断哪些组件需要构建
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.set-output.outputs.backend }}
      frontend: ${{ steps.set-output.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changes
        id: set-output
        run: |
          # 获取变更文件列表
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
            HEAD_SHA=${{ github.event.pull_request.head.sha }}
          else
            BASE_SHA=${{ github.event.before }}
            HEAD_SHA=${{ github.sha }}
          fi
          
          # 检测后端变更
          BACKEND_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- \
            "ruoyi-*/**" \
            ".github/workflows/docker-publish.yml" \
            "Dockerfile.backend" \
            "pom.xml" \
            "mvnw" \
            ".java-version" \
            "Jenkinsfile" 2>/dev/null || echo "")
          
          if [ -n "$BACKEND_FILES" ]; then
            echo "Backend files changed:"
            echo "$BACKEND_FILES"
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "No backend changes detected"
            echo "backend=false" >> $GITHUB_OUTPUT
          fi
          
          # 检测前端变更
          FRONTEND_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- \
            "openlist-web/**" \
            ".github/workflows/docker-publish.yml" \
            "Dockerfile.frontend" 2>/dev/null || echo "")
          
          if [ -n "$FRONTEND_FILES" ]; then
            echo "Frontend files changed:"
            echo "$FRONTEND_FILES"
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "No frontend changes detected"
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Build backend with Maven
        run: mvn -B package -DskipTests

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-backend:beta
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: openlist-web/package-lock.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: openlist-web

      - name: Build frontend
        run: npm run build
        working-directory: openlist-web

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-frontend:beta
          cache-from: type=gha
          cache-to: type=gha,mode=max
