# 项目相关配置
ruoyi:
  # 名称
  name: OpenListStrm
  # 版本
  version: 1.0.4
  # 版权年份
  copyrightYear: 2025
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: /data/upload
  # 获取ip地址开关
  addressEnabled: false

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为80
  port: 6895
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200（虚拟线程模式下仅作为上限）
      max: 800
      # Tomcat启动初始化的线程数，默认值10（虚拟线程模式下可减小）
      min-spare: 100
 
# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码错误{maxRetryCount}次锁定10分钟
    maxRetryCount: 5

# Spring配置
spring:
  threads:
    virtual:
      enabled: true
  messages:
    basename: classpath:i18n/messages
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    # Spring Boot 4 + Jackson 3 特性
    serialization:
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: false
  cache:
    type: simple
  main:
    banner-mode: console
    allow-bean-definition-overriding: true
    # Spring Boot 4 特性：允许循环引用（默认已开启）
    allow-circular-references: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
# MyBatis Plus配置
mybatis-plus:
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    banner: false

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /druid
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# 防止csrf攻击
csrf:
  # 过滤开关
  enabled: false
  # 白名单（多个用逗号分隔）
  whites: /druid

# JWT配置
jwt:
  secret: ${JWT_SECRET:}
  expiration: 7200000
  refresh-expiration: 604800000
