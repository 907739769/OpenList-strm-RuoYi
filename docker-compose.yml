version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: osr-mysql
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-osr}
      # 应用专用最小权限账号：MySQL 官方镜像会自动创建该用户，并仅授予 MYSQL_DATABASE 库的权限
      MYSQL_USER: ${DB_USERNAME:-osr_app}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_general_ci
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --max-connections=500
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: osr-backend
    restart: always
    ports:
      - "6895:6895"
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      # 后端使用应用专用账号连库，不再复用 MySQL root 密码
      DB_USERNAME: ${DB_USERNAME:-osr_app}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - /data:/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: osr-frontend
    restart: always
    ports:
      - "80:80"
    environment:
      VITE_APP_BASE_API: /api
    depends_on:
      - backend

volumes:
  mysql-data:
